# Single EKF — GPS Mapless Navigation
# Fuses: Odometry + IMU + GPS in one EKF with world_frame: map
# Publishes: map -> odom TF (GPS-anchored)
# DiffDrive provides: odom -> base_footprint TF
# Output: /odometry/filtered

ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 20.0
    two_d_mode: true
    publish_tf: true          # Publishes map -> odom TF
    print_diagnostics: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map          # GPS-anchored global frame

    # Wheel odometry — trust velocities only
    odom0: /odom
    odom0_config: [false, false, false,   # x, y, z
                   false, false, false,   # roll, pitch, yaw
                   true,  true,  false,   # vx, vy, vz
                   false, false, true,    # vroll, vpitch, vyaw
                   false, false, false]   # ax, ay, az

    # IMU — trust orientation + angular velocity
    imu0: /imu/data_raw
    imu0_config: [false, false, false,    # x, y, z
                  true,  true,  true,     # roll, pitch, yaw
                  false, false, false,    # vx, vy, vz
                  true,  true,  true,     # vroll, vpitch, vyaw
                  true,  true,  false]    # ax, ay, az
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

    # GPS odometry from navsat_transform — absolute XY position
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,   # x, y, z (GPS position)
                   false, false, false,   # roll, pitch, yaw
                   false, false, false,   # vx, vy, vz
                   false, false, false,   # vroll, vpitch, vyaw
                   false, false, false]   # ax, ay, az
    odom1_differential: false
