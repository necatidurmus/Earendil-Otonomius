# EKF Local — Odom-level sensor fusion
# Publishes: odom -> base_footprint TF
# Output topic: /odometry/local

ekf_local_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true          # Sole publisher of odom->base_footprint
    print_diagnostics: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom         # Local: odom-level

    # Wheel odometry — trust velocities only
    odom0: /odom
    odom0_config: [false, false, false,   # x, y, z
                   false, false, false,   # roll, pitch, yaw
                   true,  true,  false,   # vx, vy, vz
                   false, false, true,    # vroll, vpitch, vyaw
                   false, false, false]   # ax, ay, az

    # IMU — trust orientation + angular velocity + linear accel
    imu0: /imu/data_raw
    imu0_config: [false, false, false,    # x, y, z
                  true,  true,  true,     # roll, pitch, yaw
                  false, false, false,    # vx, vy, vz
                  true,  true,  true,     # vroll, vpitch, vyaw
                  true,  true,  false]    # ax, ay, az
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true
