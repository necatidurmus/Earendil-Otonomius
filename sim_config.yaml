# ═══════════════════════════════════════════════════════════════════
#  sim_config.yaml  —  Leo Rover Simülasyon Merkezi Ayar Dosyası
#  Bu dosyayı değiştirmek yeterli — launch, script ve node'lar
#  otomatik olarak buradan okur.
#
#  Bölümler:
#    physics    → Gazebo fizik motoru (adım süresi, gerçek zaman oranı)
#    gravity    → Yerçekimi vektörü (dünya çapında)
#    ground     → Zemin sürtünme katsayıları
#    robot      → Kütle, hız, ivme, tekerlek sürtünme, gövde sürtünme
#    timing     → Başlatma gecikmeleri
#    gps_monitor→ GPS/SLAM mod geçiş eşikleri
#    tunnel/door→ GPS spoof bölgeleri
#    test       → Test ayarları
# ═══════════════════════════════════════════════════════════════════

# ── Gazebo fizik motoru ─────────────────────────────────────────────
# max_step_size küçültmek hassasiyet artırır ama simülasyonu yavaşlatır.
# real_time_factor: 1.0 = gerçek zamanlı, 2.0 = 2x hızlı, 0 = sınırsız
physics:
  max_step_size:      0.001    # saniye — fizik adım süresi
  real_time_factor:   1.0      # simülasyon hız çarpanı

# ── Yerçekimi ───────────────────────────────────────────────────────
# Standart: z = -9.81 (Dünya). Mars: z = -3.72. Ay: z = -1.62
# x,y normalde 0; eğimli yüzey simülasyonu için değiştirilebilir.
gravity:
  x:  0.0
  y:  0.0
  z: -9.81

# ── Zemin sürtünme katsayıları ──────────────────────────────────────
# mu/mu2: Coulomb sürtünme katsayısı (ODE motoru). Yüksek = daha yapışkan.
# Buz: ~0.1, kuru asfalt: ~0.8, çakıl: ~0.6, kum: ~0.4
ground:
  mu:    0.8          # Birincil sürtünme katsayısı
  mu2:   0.8          # İkincil (enine) sürtünme katsayısı

# ── Robot parametreleri ─────────────────────────────────────────────
robot:
  # Kütle (kg) — URDF'teki mass değerlerini referans alır
  # base_link: 24.65, rocker: 12.486, wheel: 2.55
  # extra_mass: robota ekstra yük ekler (kargo simülasyonu)
  extra_mass_kg:     0.0      # kg — gövdeye eklenecek ekstra kütle

  # Hız limitleri
  max_speed_ms:      0.4      # m/s — ileri/geri max hız
  max_rotation:      1.0      # rad/s — max dönüş hızı

  # İvme limitleri (DiffDrive plugin)
  max_linear_accel:  25.0     # m/s² — max doğrusal ivme
  max_angular_accel: 30.0     # rad/s² — max açısal ivme

  # Costmap
  radius_m:          0.49     # metre — robot yarıçapı
  inflation_radius:  0.55     # metre — costmap inflation (dar geçit için küçük)

  # Tekerlek sürtünme katsayıları (ODE)
  wheel_mu:          3.0      # Tekerlek-zemin birincil sürtünme
  wheel_mu2:         3.0      # Tekerlek-zemin ikincil sürtünme
  wheel_slip1:       0.001    # Boyuna kayma (0 = kayma yok)
  wheel_slip2:       0.0      # Enine kayma

  # Gövde/rocker sürtünme (gövdenin zemine sürtünmesi)
  body_mu:           0.3      # Gövde-zemin sürtünme
  body_mu2:          0.3

  # Tekerlek boyutları (DiffDrive plugin)
  wheel_separation:  0.716    # metre — sol-sağ tekerlek arası
  wheel_radius:      0.125    # metre — tekerlek yarıçapı

# ── Startup zamanlama (saniye) ──────────────────────────────────────
# Sistemin sırayla ayağa kalkması için bekleme süreleri.
# Daha güçlü bilgisayarda küçültebilirsin.
timing:
  gazebo_startup:    25       # Gazebo'nun tamamen yüklenmesi için bekleme
  ukf_global_start:   4      # UKF Local başladıktan sonra UKF Global gecikmesi
  navsat_start:        8     # UKF Global'den sonra NavSat Transform gecikmesi
  nav2_start:         40     # Nav2 başlatma gecikmesi (tam TF zinciri için)
  nav_stack_wait:     50     # Test scriptinin nav stack'i beklemesi
  rviz_start:         42     # RViz gecikmesi (Nav2 hazır olduktan sonra)

# ── GPS Monitor eşikleri ────────────────────────────────────────────
# Kalite skoru 0.0 (kötü) – 1.0 (mükemmel) arasında değişir.
# GPS→SLAM: kalite bu eşiğin altına düşerse SLAM moduna geçer.
# SLAM→GPS: kalite bu eşiğin üstüne çıkarsa GPS moduna döner.
gps_monitor:
  gps_to_slam_threshold:  0.3    # Bu değerin altına düşerse → SLAM
  slam_to_gps_threshold:  0.45   # Bu değerin üstüne çıkarsa → GPS (sim GPS status=0 → quality=0.50)
  window_size:            10     # Kaç ölçümün ortalaması alınsın
  hysteresis_secs:        3.0    # Mod geçişleri arası minimum süre (chatter önleme)
  gps_timeout_secs:       3.0    # GPS mesajı bu süre gelmezse kalite=0 say
  confirmation_count:     3      # Mod geçişi için ardışık onay sayısı
  verbose:               true    # Log çıktısı açık mı

# ── Tünel GPS spoof bölgesi ─────────────────────────────────────────
# leo_obstacles.sdf'teki tünel konumuyla eşleşmeli.
# Robot bu bölgeye girince STATUS_NO_FIX yayınlanır.
# Sınırlar duvar iç kenarlarından hesaplanır:
#   Duvarlar y=±1.5, kalınlık 0.3m → iç kenar y=±1.35
tunnel:
  x_min:  19.5             # Tünel başlangıcı (metre, Gazebo koordinatı)
  x_max:  30.5             # Tünel bitişi
  y_max:   1.35            # |y| sınırı — duvar iç kenarı

# ── Kapı GPS spoof bölgesi ──────────────────────────────────────────
# Robot bu bölgede zayıf GPS alır (STATUS_FIX, ~5m hata).
door:
  x_min:  33.5
  x_max:  36.5
  y_max:   1.0

# ── Test ayarları ───────────────────────────────────────────────────
test:
  timeout:         600     # Tüm testin maksimum süresi (saniye)
  world:      obstacles    # 'obstacles' (tünel+kapı) veya 'empty'
  launch_rviz:    false    # RViz başlatılsın mı (run_hybrid_test.sh varsayılanı)
# ── GPS Datum (dünya orijini) ─────────────────────────────────────────────
# SDF dosyalarındaki spherical_coordinates ile eşleşmeli.
# navsat.yaml datum değeri de buradan okunmalıdır.
gps_datum:
  lat:  39.925018          # Ankara civarı
  lon:  32.836956
  alt:  890.0              # metre (MSL)